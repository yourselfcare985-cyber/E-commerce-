<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grey Dialogue Page</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Pacifico', cursive;
    background: #d0d0d0; /* grey background */
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    display: flex;
    align-items: center;
    gap: 40px;
    max-width: 1000px;
    width: 90%;
  }

  .left img {
    max-width: 250px;
    border-radius: 10px;
  }

  .right {
    background: #555555; /* dark grey bubble */
    color: white;
    padding: 20px 25px;
    border-radius: 20px;
    font-size: 2rem;
    max-width: 500px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
  }

  @media (max-width: 768px) {
    .container {
      flex-direction: column;
      gap: 20px;
    }
    .right {
      text-align: center;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="left">
    <img src="https://via.placeholder.com/250x250.png?text=Ladka" alt="Ladka Image">
  </div>
  <div class="right">
    Haan bol, kya kaam h ??
  </div>
</div>

</body>
</html>
