<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
}

.search-box {
  margin: 20px;
  text-align: center;
}

.search-box input {
  padding: 10px;
  width: 60%;
  font-size: 16px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

.product {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.product img {
  width: 150%;
  height: 490px;
  object-fit: cover;
}

button {
  padding: 10px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #333;
}

.cart {
  position: fixed;
  top: 10px;
  right: 10px;
  background: black;
  color: white;
  padding: 10px;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>
  <h1>My E-Commerce Store</h1>
</header>

<div class="cart">
  Cart: <span id="cart-count">0</span>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</div>

<div class="products" id="product-list"></div>

<script>
let products = [
  {
    name: "Shoes",
    price: 999,
    image: "https://amzn.in/d/0cDwZnK7"
  },
  {
    name: "Watch",
    price: 1999,
    image: "IMG-20260326-WA0016.jpg"
  },
  {
    name: "Headphones",
    price: 1499,
    image: "https://via.placeholder.com/200"
  }
];

let cart = 0;

function displayProducts(list) {
  let container = document.getElementById("product-list");
  container.innerHTML = "";

  list.forEach(product => {
    container.innerHTML += `
      <div class="product">
        <img src="${product.image}">
        <h3>${product.name}</h3>
        <p>₹${product.price}</p>
        <button onclick="addToCart()">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart() {
  cart++;
  document.getElementById("cart-count").innerText = cart;
}

function searchProduct() {
  let value = document.getElementById("search").value.toLowerCase();
  
  let filtered = products.filter(p =>
    p.name.toLowerCase().includes(value)
  );

  displayProducts(filtered);
}

displayProducts(products);
</script>

</body>
</html>
