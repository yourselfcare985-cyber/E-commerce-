<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIZK STORE</title>

<style>
body {
  font-family: Quadrat;
  margin: 0;
  background: #00;
}

header {
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
}

.search-box {
  margin: 20px;
  text-align: center;
}

.search-box input {
  padding: 10px;
  width: 60%;
  font-size: 16px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(1000px, 1fr));
  gap: 100px;
  padding: 100px;
}

.product {
  background: black;
  padding: 100px;
  border-radius: 100px;
  text-align: center;
}
.product {
  opacity: 0;
  transform: translateY(20px);
  animation: show 0.5s forwards;
}

@keyframes show {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.product img {
  width: 1000%;
  height: 1000px;
  object-fit: cover;
}

button {
  padding: 50px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #333;
}

.cart {
  position: fixed;
  top: 15px;
  right: 15px;
  background: black;
  color: white;
  padding: 10px;
  border-radius: 5px;
}
  
  /* Product hover zoom */
.product {
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.product:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* Image zoom inside card */
.product img {
  transition: transform 0.3s ease;
}

.product:hover img {
  transform: scale(1.1);
}

/* Button animation */
button {
  transition: all 0.3s ease;
}

button:hover {
  background: #ff4d4d;
  transform: scale(1.1);
}

/* Page load fade-in */
body {
  animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

/* Cart bounce animation */
@keyframes bounce {
  0% { transform: scale(1); }
  30% { transform: scale(1.3); }
  60% { transform: scale(0.9); }
  100% { transform: scale(1); }
}

.bounce {
  animation: bounce 0.4s;
}
</style>
</head>

<body>

<header>
  <h1>KIZK STORE</h1>
</header>

<div class="cart">
  Cart: <span id="cart-count">0</span>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</div>

<div class="products" id="product-list"></div>

<script>
let products = [
  {
    name: "Shoes",
    price: "$999",
    image: "Screenshot_20260329-103424-removebg-preview.png"
  },
  {
    name: "Watch",
    price: "$2999",
    image: "richard-mille-rm-50-03-mclaren-f1-watch-and-strap.jpg__1536x0_q75_crop-scale_subsampling-2_upscale-false-removebg-preview.png"
  },
  {
    name: "Headphones",
    price: "$1499",
    image: "Screenshot_20260329-104346-removebg-preview.png"
  }
];

let cart = 0;

function displayProducts(list) {
  let container = document.getElementById("product-list");
  container.innerHTML = "";

  list.forEach(product => {
    container.innerHTML += `
      <div class="product">
        <img src="${product.image}">
        <h3>${product.name}</h3>
        <p>₹${product.price}</p>
        <button onclick="addToCart()">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart() {
  cart++;
  let cartElement = document.getElementById("cart-count");
  cartElement.innerText = cart;

  // animation trigger
  cartElement.classList.add("bounce");

  setTimeout(() => {
    cartElement.classList.remove("bounce");
  }, 400);
}

function searchProduct() {
  let value = document.getElementById("search").value.toLowerCase();
  
  let filtered = products.filter(p =>
    p.name.toLowerCase().includes(value)
  );

  displayProducts(filtered);
}

displayProducts(products);
</script>
  
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "products"));
  let products = [];

  querySnapshot.forEach((doc) => {
    products.push(doc.data());
  });

  displayProducts(products);
}

loadProducts();
</script>
  
</body>
</html>
