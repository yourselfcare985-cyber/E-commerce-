<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIZK STORE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
}

/* light green background */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #d4f8d4 10%, transparent 10%);
  background-size: 40px 40px;
  z-index: -1;
  opacity: 0.4;
}

/* header */
header {
  background: white;
  padding: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.logo {
  height: 65px;
}

/* menu */
.menu-btn {
  position: absolute;
  left: 15px;
  font-size: 25px;
  cursor: pointer;
}

.menu {
  position: fixed;
  top: 0;
  left: -220px;
  width: 220px;
  height: 100%;
  background: black;
  color: white;
  padding: 20px;
  transition: 0.3s;
}

.menu a {
  display: block;
  color: white;
  margin: 15px 0;
  text-decoration: none;
}

.menu.active {
  left: 0;
}

/* cart */
.cart {
  position: fixed;
  top: 15px;
  right: 15px;
  background: black;
  color: white;
  padding: 10px 15px;
  border-radius: 10px;
}

/* bounce animation */
@keyframes bounce {
  0% { transform: scale(1); }
  30% { transform: scale(1.3); }
  60% { transform: scale(0.9); }
  100% { transform: scale(1); }
}

.bounce {
  animation: bounce 0.4s;
}

/* search */
.search-box {
  text-align: center;
  margin: 20px;
}

.search-box input {
  width: 70%;
  padding: 12px;
  border-radius: 25px;
  border: 2px solid #00c853;
  font-size: 16px;
}

.search-box input:focus {
  box-shadow: 0 0 10px rgba(0,200,83,0.5);
  outline: none;
}

/* products */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
  padding: 20px;
}

/* product */
.product {
  background: black;
  color: white;
  border-radius: 15px;
  overflow: hidden;
  text-align: center;

  opacity: 0;
  transform: translateY(20px);
  animation: show 0.5s forwards;
}

/* animation */
@keyframes show {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* hover */
.product:hover {
  transform: scale(1.05);
  transition: 0.3s;
}

.product img,
.product video {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* text */
.product h3,
.product p {
  margin: 10px;
}

/* button */
button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff4d4d;
  transform: scale(1.1);
}
</style>
</head>

<body>

<div class="menu" id="menu">
  <a href="#">Home</a>
  <a href="#">Search</a>
</div>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <img src="logo.png" class="logo">
</header>

<div class="cart">
  🛒 <span id="cart-count">0</span>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</div>

<div class="products" id="product-list"></div>

<script>
let products = [
  {
    name: "Shoes",
    price: 999,
    video: "Book_20260329_122604_0000.mp4"
  },
  {
    name: "Watch",
    price: 2999,
    image: "richard-mille.jpg"
  },
  {
    name: "Headphones",
    price: 1499,
    image: "Screenshot_20260329-104346-removebg-preview.png"
  }
];

let cart = 0;

function displayProducts(list) {
  let container = document.getElementById("product-list");
  container.innerHTML = "";

  list.forEach((product, index) => {

    let media = product.video
      ? `<video autoplay muted loop playsinline src="${product.video}"></video>`
      : `<img src="${product.image}">`;

    container.innerHTML += `
      <div class="product" style="animation-delay:${index * 0.1}s">
        ${media}
        <h3>${product.name}</h3>
        <p>₹${product.price}</p>
        <button onclick="addToCart()">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart() {
  cart++;
  let el = document.getElementById("cart-count");
  el.innerText = cart;

  el.classList.add("bounce");
  setTimeout(() => el.classList.remove("bounce"), 400);
}

function searchProduct() {
  let val = document.getElementById("search").value.toLowerCase();
  let filtered = products.filter(p => p.name.toLowerCase().includes(val));
  displayProducts(filtered);
}

function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}

displayProducts(products);
</script>

</body>
</html>
