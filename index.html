<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIZK STORE</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: white;
}

/* light green background design */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #d4f8d4 10%, transparent 10%);
  background-size: 40px 40px;
  z-index: -1;
  opacity: 0.4;
}

/* header */
header {
  background: white;
  padding: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* logo */
.logo {
  height: 40px;
}

/* hamburger */
.menu-btn {
  position: absolute;
  left: 15px;
  font-size: 25px;
  cursor: pointer;
}

/* dropdown menu */
.menu {
  position: fixed;
  top: 0;
  left: -200px;
  width: 200px;
  height: 100%;
  background: black;
  color: white;
  padding: 20px;
  transition: 0.3s;
}

.menu a {
  display: block;
  color: white;
  margin: 15px 0;
  text-decoration: none;
}

/* open menu */
.menu.active {
  left: 0;
}

/* cart icon */
.cart {
  position: fixed;
  top: 15px;
  right: 15px;
  font-size: 20px;
  background: black;
  color: white;
  padding: 10px;
  border-radius: 10px;
}

/* products */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* product card */
.product {
  background: black;
  color: white;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
}

/* media */
.product img,
.video-wrapper video {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}
.search-box {
  margin: 20px;
  text-align: center;
}

.search-box input {
  padding: 10px;
  width: 60%;
  font-size: 16px;
  border-radius: 5px;
  border: none;
}

.product:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}

/* IMAGE FIX */
.product img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 8px;
  transition: transform 0.3s ease;
}

.product:hover img {
  transform: scale(1.1);
}

.product h3 {
  margin: 10px 0 5px;
}

.product p {
  margin: 5px 0;
  font-weight: bold;
}

/* BUTTON */
button {
  padding: 10px 15px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
  border-radius: 5px;
  transition: all 0.3s ease;
}

button:hover {
  background: #ff4d4d;
  color: white;
  transform: scale(1.05);
}

.video-wrapper {
  width: 100%;
  height: 200px;
  overflow: hidden;
  border-radius: 10px;
}

.video-wrapper video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* smooth entry animation */
.product {
  opacity: 0;
  transform: translateY(30px) scale(0.95);
  animation: smoothShow 0.6s forwards;
}

@keyframes smoothShow {
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}
/* ANIMATIONS */
@keyframes show {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes bounce {
  0% { transform: scale(1); }
  30% { transform: scale(1.3); }
  60% { transform: scale(0.9); }
  100% { transform: scale(1); }
}

.bounce {
  animation: bounce 0.4s;
}
</style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <img src="logo.png" class="logo">
</header>

<div class="cart">
  Cart: <span id="cart-count">0</span>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</div>

<div class="products" id="product-list"></div>

<script>
let products = [
  {
    name: "Shoes",
    price: 999,
    video: "Book_20260329_122604_0000.mp4"
  },
  {
    name: "Watch",
    price: 2999,
    image: "richard-mille-rm-50-03-mclaren-f1-watch-and-strap.jpg__1536x0_q75_crop-scale_subsampling-2_upscale-false-removebg-preview.png"
  },
  {
    name: "Headphones",
    price: 1499,
    image: "Screenshot_20260329-104346-removebg-preview.png"
  }
];

let cart = 0;

function displayProducts(list) {
  let container = document.getElementById("product-list");
  container.innerHTML = "";

  list.forEach((product, index) => {

    let media = "";

    if (product.video) {
      media = `
        <div class="video-wrapper">
          <video autoplay muted loop playsinline>
            <source src="${product.video}" type="video/mp4">
          </video>
        </div>
      `;
    } else {
      media = `<img src="${product.image}">`;
    }

    container.innerHTML += `
      <div class="product" style="animation-delay:${index * 0.15}s">
        ${media}
        <h3>${product.name}</h3>
        <p>₹${product.price}</p>
        <button onclick="addToCart()">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart() {
  cart++;
  let cartElement = document.getElementById("cart-count");
  cartElement.innerText = cart;

  cartElement.classList.add("bounce");

  setTimeout(() => {
    cartElement.classList.remove("bounce");
  }, 400);
}

function searchProduct() {
  let value = document.getElementById("search").value.toLowerCase();

  let filtered = products.filter(p =>
    p.name.toLowerCase().includes(value)
  );

  displayProducts(filtered);
}

displayProducts(products);
</script>

</body>
</html>
