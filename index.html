<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIZK STORE</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #111;
  color: white;
  animation: fadeIn 1s ease-in;
}

header {
  background: black;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.search-box {
  margin: 20px;
  text-align: center;
}

.search-box input {
  padding: 10px;
  width: 60%;
  font-size: 16px;
  border-radius: 5px;
  border: none;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* PRODUCT CARD */
.product {
  background: #1c1c1c;
  border-radius: 10px;
  overflow: hidden;
  text-align: center;
  padding: 10px;

  opacity: 0;
  transform: translateY(20px);
  animation: show 0.5s forwards;

  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.product:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}

/* IMAGE FIX */
.product img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 8px;
  transition: transform 0.3s ease;
}

.product:hover img {
  transform: scale(1.1);
}

.product h3 {
  margin: 10px 0 5px;
}

.product p {
  margin: 5px 0;
  font-weight: bold;
}

/* BUTTON */
button {
  padding: 10px 15px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
  border-radius: 5px;
  transition: all 0.3s ease;
}

button:hover {
  background: #ff4d4d;
  color: white;
  transform: scale(1.05);
}

/* CART */
.cart {
  position: fixed;
  top: 15px;
  right: 15px;
  background: black;
  padding: 10px;
  border-radius: 5px;
}

/* ANIMATIONS */
@keyframes show {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes bounce {
  0% { transform: scale(1); }
  30% { transform: scale(1.3); }
  60% { transform: scale(0.9); }
  100% { transform: scale(1); }
}

.bounce {
  animation: bounce 0.4s;
}
</style>
</head>

<body>

<header>KIZK STORE</header>

<div class="cart">
  Cart: <span id="cart-count">0</span>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</div>

<div class="products" id="product-list"></div>

<script>
let products = [
  {
    name: "Shoes",
    price: 999,
    image: "https://via.placeholder.com/300"
  },
  {
    name: "Watch",
    price: 2999,
    image: "https://via.placeholder.com/300"
  },
  {
    name: "Headphones",
    price: 1499,
    image: "https://via.placeholder.com/300"
  }
];

let cart = 0;

function displayProducts(list) {
  let container = document.getElementById("product-list");
  container.innerHTML = "";

  list.forEach((product, index) => {
    container.innerHTML += `
      <div class="product" style="animation-delay:${index * 0.1}s">
        <img src="${product.image}">
        <h3>${product.name}</h3>
        <p>₹${product.price}</p>
        <button onclick="addToCart()">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart() {
  cart++;
  let cartElement = document.getElementById("cart-count");
  cartElement.innerText = cart;

  cartElement.classList.add("bounce");

  setTimeout(() => {
    cartElement.classList.remove("bounce");
  }, 400);
}

function searchProduct() {
  let value = document.getElementById("search").value.toLowerCase();

  let filtered = products.filter(p =>
    p.name.toLowerCase().includes(value)
  );

  displayProducts(filtered);
}

displayProducts(products);
</script>

</body>
</html>
