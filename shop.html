<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comment Style Layout</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<style>
  /* RESET */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body, html {
    height: 100%;
    font-family: 'Pacifico', cursive;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Dotted background */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(#ccc 1px, transparent 1px);
    background-size: 20px 20px;
    z-index: -1;
  }

  .container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 50px;
    max-width: 1000px;
    width: 90%;
  }

  .left img {
    max-width: 250px;
    border-radius: 10px;
    object-fit: cover;
  }

  .right {
    font-size: 2rem;
    color: #333;
    max-width: 500px;
    background: #f0f0f0;
    padding: 20px 25px;
    border-radius: 20px;
    box-shadow: 2px 2px 12px rgba(0,0,0,0.1);
  }

  @media (max-width: 768px) {
    .container {
      flex-direction: column;
      gap: 30px;
    }
    .right {
      text-align: center;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="left">
    <img src="1774169390316_2-removebg-preview.png" alt="Ladka Image">
  </div>
  <div class="right">
    "Yahan kyun aaya h , wapas ja shop now daba"
  </div>
</div>

</body>
</html>
